<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book an Appointment — Fresh Up Barbershop</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Lobster&family=Playfair+Display:ital,wght@0,700;0,900;1,400;1,700&family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="/css/index.css">
    <link rel="stylesheet" href="/css/booking.css">
</head>

<body>

    <div class="grid-background"></div>

    <!-- ==================== HEADER ==================== -->
    <header id="mainHeader">
        <a href="/index.html" class="header-logo">
            <img src="/images/freshup.png" alt="Fresh Up Barbershop Logo">
        </a>
        <div class="header-right">
            <nav>
                <a href="index.html" class="active">Home</a>
                <a href="services.html">Services</a>
                <a href="locations.html">Locations</a>
                <a href="gallery.html">Gallery</a>
                <a href="contact.html">Contact</a>
            </nav>
            <a href="/booking.html" class="book-now-btn">Book Now</a>
        </div>
    </header>

    <!-- ==================== BOOKING ==================== -->
    <main class="booking-main">

        <!-- Progress indicator -->
        <div id="stepProgress"></div>

        <!-- Dynamic content container -->
        <div id="bookingContent">
            <!-- booking.js renders here -->
        </div>

    </main>

    <!-- ==================== FOOTER ==================== -->
    <footer class="site-footer">
        <div class="footer-bottom">
            <p>© 2026 Fresh Up Barbershop San Diego. All rights reserved.</p>
        </div>
    </footer>

    <!-- ==================== SCRIPTS ==================== -->
    <script>
        // Header scroll
        (function () {
            var h = document.getElementById('mainHeader');
            function u() { h.classList[window.pageYOffset > 10 ? 'add' : 'remove']('scrolled'); }
            window.addEventListener('scroll', u); u();
        })();
    </script>
    <script src="/js/booking.js"></script>

</body>

</html>
